# Xcode build configuration for firefox-ios
# Used by: anvil warm-xcode-cache --dataset datasets/firefox-ios
#           anvil run-evals --eval-backend xcode --dataset datasets/firefox-ios

project: firefox-ios/Client.xcodeproj
scheme: Client
destination: "generic/platform=iOS Simulator"

# Per-task unit tests.
# Each task can have a single tests.swift file at tasks/firefox-ios/task-N/tests.swift.
# The eval harness copies it into test_files_dest before running xcodebuild test.
test_scheme: Client
test_destination: "platform=iOS Simulator,name=iPhone 17 Pro,OS=latest"
test_files_dest: firefox-ios/firefox-ios-tests/Tests/ClientTests
