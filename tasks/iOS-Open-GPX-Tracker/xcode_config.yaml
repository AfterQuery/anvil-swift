# Xcode build configuration for iOS-Open-GPX-Tracker
# Used by: anvil warm-xcode-cache --dataset datasets/iOS-Open-GPX-Tracker
#           anvil run-evals --eval-backend xcode --dataset datasets/iOS-Open-GPX-Tracker

# Prefer workspace (CocoaPods), fall back to project for older commits
workspace: OpenGpxTracker.xcworkspace
project: OpenGpxTracker.xcodeproj
scheme: OpenGpxTracker

# generic/platform for compile-only (no simulator needed)
destination: "generic/platform=iOS Simulator"

# No meaningful XCTests in this repo (only placeholder stubs).
# Omit test_scheme to skip running tests — eval is compile-only.
# test_scheme: OpenGpxTracker
# test_destination: "platform=iOS Simulator,name=iPhone 16,OS=latest"
