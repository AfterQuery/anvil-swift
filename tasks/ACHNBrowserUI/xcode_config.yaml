# Xcode build configuration for ACHNBrowserUI
# Used by: anvil warm-xcode-cache --dataset datasets/ACHNBrowserUI
#           anvil run-evals --eval-backend xcode --dataset datasets/ACHNBrowserUI

# Relative path from repo root to the .xcodeproj
project: ACHNBrowserUI/ACHNBrowserUI.xcodeproj

scheme: ACHNBrowserUI

# generic/platform avoids needing a specific simulator device installed;
# sufficient for compile-only checks. For XCTest runs, change to e.g.:
#   platform=iOS Simulator,name=iPhone 16,OS=18.0
destination: "generic/platform=iOS Simulator"
