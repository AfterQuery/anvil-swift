# Xcode build configuration for ACHNBrowserUI
# Used by: anvil warm-xcode-cache --dataset datasets/ACHNBrowserUI
#           anvil run-evals --eval-backend xcode --dataset datasets/ACHNBrowserUI

project: ACHNBrowserUI/ACHNBrowserUI.xcodeproj
scheme: ACHNBrowserUI

# generic/platform for compile-only (no simulator needed)
destination: "generic/platform=iOS Simulator"

# XCTest configuration (requires iOS simulator runtime installed)
# The test_scheme runs the repo's built-in unit tests after compilation.
# Set test_destination to a real simulator device available on your machine.
# To list available simulators: xcrun simctl list devices available
test_scheme: ACHNBrowserUI
test_destination: "platform=iOS Simulator,name=iPhone 16,OS=latest"

# Optional: run only specific test targets/classes/methods.
# Uses xcodebuild's -only-testing: flag. Omit to run all tests in the scheme.
# Examples:
#   - "BackendTests"                           (entire test target)
#   - "BackendTests/ItemsTests"                (one test class)
#   - "BackendTests/ItemsTests/testItemDecode" (one test method)
# test_only:
#   - BackendTests
#   - UITests
