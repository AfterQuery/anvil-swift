  problem_statement: "# Add Edge Shadow Effect\n\n## Problem\nThe pull-to-dismiss
    gesture currently only supports background effects (shadow/blur) but doesn't cast
    any shadow from the view itself. This makes the gesture feel flat and less polished.\n\
    \n## Feature Request\nAdd an edge shadow effect that appears on the view being
    dismissed, creating depth and making the pull gesture more visually appealing.\n\
    \n**Expected behavior:**\n- Shadow should appear at the top edge of the view\n\
    - Shadow opacity should increase gradually as the user pulls down (0% → 100%)\n\
    - Shadow should fade out when the gesture completes or is cancelled\n- Should
    be configurable (opacity, radius, color, offset) with reasonable defaults\n\n\
    **Example usage:**\n```swift\nlet pullToDismiss = PullToDismiss(scrollView: tableView)\n\
    \n// Use default shadow\npullToDismiss?.edgeShadow = EdgeShadow.default\n\n//
    Or customize\npullToDismiss?.edgeShadow = EdgeShadow(\n    opacity: 0.8,\n   \
    \ radius: 8.0,\n    color: .darkGray,\n    offset: CGSize(width: 0, height: -10)\n\
    )\n\n// Disable if needed\npullToDismiss?.edgeShadow = nil\n```\n\n**Notes:**\n\
    - Should work alongside existing background effects\n- Use CALayer shadow properties
    for performance\n- Shadow intensity should scale with pull progress (similar to
    how background effects work)"
