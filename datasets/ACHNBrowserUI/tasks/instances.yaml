  base_commit: 3d11674846dd9ad905de616782134b0a76a4e148
  problem_statement: "## Feature: Track per-variant collection progress for items\n\
    \n### Problem Description\n\nIn the **ACHNBrowserUI** app, the favorite (star)\
    \ system for items is binary: an item is either liked or not. However, many catalog\
    \ items have multiple color or style variants. Users have no way to tell from\
    \ the UI whether they have collected some but not all variants of a particular\
    \ item, and tapping the favorite button on a multi-variant item simply toggles\
    \ the parent item rather than letting users select specific variants.\n\nThis\
    \ makes it difficult to track per-variant collection progress.\n\n### Acceptance\
    \ Criteria\n\n1. The like system must support three visual states for multi-variant\
    \ items: no variants collected, some variants collected (partial), and all variants\
    \ collected (complete).\n2. Each state must use a distinct icon so users can see\
    \ collection progress at a glance.\n3. Tapping the favorite button on a multi-variant\
    \ item must present a variant selection UI rather than directly toggling the parent\
    \ item.\n4. The variant selection UI must be accessible from both the item list\
    \ and the item detail view.\n5. Liking the first variant of an item must automatically\
    \ add the parent item to the collection. Unliking the last variant must automatically\
    \ remove it.\n6. The icon state must update immediately when variants are toggled.\n\
    7. Items with zero or one variant must retain the existing binary like behavior\
    \ and not show partial states.\n\n### Required API Surface\n\nThe implementation\
    \ must expose these names (tests depend on them to compile):\n\n- `Item.hasSomeVariations`\n\
    - `VariantsCompletionStatus` \u2014 `.unstarted`, `.partial`, `.complete`\n- `[String:\
    \ [Variant]].completionStatus(for:)`\n- `UserCollection.toggleVariant(item:variant:)\
    \ -> Bool`\n"
  image_name: marvdeng/anvil-images:ACHNBrowserUI.task-3
- instance_id: ACHNBrowserUI.task-4
