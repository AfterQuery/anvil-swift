  base_commit: 89ac53bfe6d0769411f4005060e8974fa8fd35d4
  problem_statement: "## Feature: Add sorting options to the Villagers list\n\n###\
    \ Problem Description\n\nIn the **ACHNBrowserUI** app, the Villagers list view\
    \ displays all villagers but provides no way to sort them. Users who want to find\
    \ villagers by name or browse by species have to manually scan through the entire\
    \ unsorted list.\n\n### Acceptance Criteria\n\n1. Users must be able to sort villagers\
    \ by name and by species.\n2. Sorting must use locale-aware string comparison.\n\
    3. A sort button in the navigation bar must present the available sort options.\n\
    4. The sort button icon must visually indicate whether a sort is currently active.\n\
    5. Setting the sort to the same value it already holds must reverse the sort order\
    \ (ascending / descending). The initial sort direction must be ascending.\n6.\
    \ There must be a way to clear the active sort, restoring the default villager\
    \ order.\n7. When searching, search results must take priority over sorting.\n\
    8. French localization must be added for any new user-facing sort strings.\n9.\
    \ The existing search functionality and villager detail view must remain unchanged.\n\
    \n### Required API Surface\n\nThe implementation must expose these names (tests\
    \ depend on them to compile):\n\n- `VillagersViewModel.Sort` \u2014 `.name`, `.species`\n\
    - `VillagersViewModel.sort`, `VillagersViewModel.sortedVillagers`\n"
  image_name: marvdeng/anvil-images:ACHNBrowserUI.task-4
