  problem_statement: "## Feature: Show entered turnip prices instead of predictions\n\
    \n### Problem Description\n\nIn the **ACHNBrowserUI** turnip prediction screen,\
    \ when a user enters their actual selling prices for specific time slots, the\
    \ chart and price rows still display calculated average or min/max prediction\
    \ values for those slots. Users cannot tell which numbers are real data they entered\
    \ versus predictions generated by the calculator.\n\nThis is confusing because\
    \ the whole point of entering prices is to refine the forecast, yet the display\
    \ overwrites entered values with computed ones.\n\n### Acceptance Criteria\n\n\
    1. When a user has entered an actual turnip price for a time slot, the display\
    \ must show that exact value rather than a calculated prediction.\n2. In the min/max\
    \ view, an entered value must appear as a single number (not a range), since the\
    \ min and max are identical when the price is known.\n3. Entered values must be\
    \ visually distinguished from predictions.\n4. Predicted values retain existing\
    \ color coding.\n5. Switching between average, min/max, and profit display tabs\
    \ must not cause visual glitches or show stale data.\n6. Both average-price and\
    \ min/max-price row types must be able to detect whether a given time slot contains\
    \ a user-entered value.\n7. The profit calculations should use entered values\
    \ where available.\n\n### Required API Surface\n\nThe implementation must expose\
    \ these names (tests depend on them to compile):\n\n- `TurnipsPriceRow` \u2014\
    \ `isEntered(meridian: TurnipsAveragePriceRow.Meridian) -> Bool`, where `Meridian`\
    \ is a nested enum with cases `.am` and `.pm`\n- `TurnipsAveragePriceRow` \u2014\
    \ TurnipsPriceRow; `init(label:prices:minMaxPrices:)`; `label`, `prices`, `minMaxPrices`\n\
    - `TurnipsMinMaxPriceRow` \u2014 TurnipsPriceRow; `init(label:prices:averagePrices:)`;\
    \ `label`, `prices`, `averagePrices`\n- `View.eraseToAnyView()`\n\n### Xcode Project\
    \ Note\n\nThis is a traditional Xcode project (not SwiftPM). New `.swift` files\
    \ must be registered in `project.pbxproj` or they will not compile.\n"
  image_name: marvdeng/anvil-images:ACHNBrowserUI.task-8
- instance_id: ACHNBrowserUI.task-9
  repo_name: ACHNBrowserUI
  base_commit: d01e4353bd393e5fefcdac8910d9adc1d9ce7892
  problem_statement: "## Feature: Track today's villager visits on the Dashboard\n\
    \n### Problem Description\n\nIn **ACHNBrowserUI**, the Today Dashboard can track\
    \ custom chores and daily tasks, but it has no way to track player interactions\
    \ with island residents. In Animal Crossing, players can gift each of their 10\
    \ villagers once per day. There is currently no in-app way to record which residents\
    \ have been visited or gifted today.\n\nVillagers that the user has marked as\
    \ residents (via the Home button on the villager detail view) should automatically\
    \ appear in a new \"Villager Visits\" section of the Today Dashboard. The user\
    \ can then check off each resident after visiting or gifting them, and reset the\
    \ section at the start of a new day \u2014 exactly mirroring how the Custom Chores\
    \ section works.\n\n### Acceptance Criteria\n\n1. A new `TodaySection.Name.villagerVisits`\
    \ section type must be added and included in the default section list.\n2. `UserCollection`\
    \ must track which resident villagers have been visited today via a `visitedResidents`\
    \ property, support toggling a villager's visited state, and support resetting\
    \ all visited states. Note: the section is named \"Villager Visits\" but the `UserCollection`\
    \ API uses \"resident\" terminology \u2014 do not name the properties `villagerVisits`,\
    \ `toggleVillagerVisit`, or `resetVillagerVisits`.\n3. A long-press on a villager\
    \ in the visits section must open the villager detail view so the player can check\
    \ gift preferences.\n4. The section must hide the reset button when no villagers\
    \ have been visited yet.\n5. German localization strings must be provided for\
    \ the new section title.\n6. Existing Today Dashboard sections (daily tasks, chores,\
    \ etc.) must remain unchanged.\n\n### Required API Surface\n\n- `TodaySection.Name.villagerVisits`\n\
    - `UserCollection.visitedResidents: [Villager]`\n- `UserCollection.toggleVisitedResident(villager:)`\n\
    - `UserCollection.resetVisitedResidents()`\n"
  image_name: marvdeng/anvil-images:ACHNBrowserUI.task-9
