  base_commit: e4c80e95cc9ac5a0870c7e749d1c7c9b219bb360
  problem_statement: "## Feature: Add creator and custom design tracking to the Collection\
    \ tab\n\n### Problem Description\n\nThe **ACHNBrowserUI** app has no way for users\
    \ to save and organize Animal Crossing custom design codes (creator codes like\
    \ `MA-XXXX-XXXX-XXXX` and item codes like `MO-XXXX-XXXX-XXXX`). Players frequently\
    \ share these codes online and need a place to store them within the app.\n\n\
    Additionally, the Collection tab's segmented picker currently has four top-level\
    \ segments (Items, Villagers, Critters, Lists). Adding more segments causes label\
    \ truncation on smaller screens. The \"Critters\" section is also redundant since\
    \ critter data is already featured on the Dashboard. The navigation structure\
    \ needs to be reorganized to accommodate new collection categories without overcrowding\
    \ the picker.\n\n### Acceptance Criteria\n\n1. Users can create, view, and delete\
    \ custom design entries with name, code, and description.\n2. Design codes are\
    \ validated against the MA/MO prefix format and formatted consistently.\n3. Saved\
    \ designs appear in a dedicated list within the Collection tab.\n4. The Collection\
    \ picker no longer truncates on small screens.\n5. Critters and designs are accessible\
    \ via a secondary navigation point within Collection.\n6. Empty collection states\
    \ display a helpful message to the user.\n7. All design data persists across app\
    \ launches.\n8. Existing collection features (items, villagers, lists) remain\
    \ functional.\n9. The app builds and runs without regressions.\n\n### Required\
    \ API Surface\n\nThe implementation must expose these names (tests depend on them\
    \ to compile):\n\n- `Design` \u2014 Backend; `title`, `code`, `description`, `hasValidCode`;\
    \ Identifiable, Equatable\n- `UserCollection.designs`\n- `DesignFormViewModel(design:\
    \ Design?)`, `design`\n- `DesignRowViewModel(design: Design)`, `category: String`\
    \ (returns `\"Creator\"` for codes with `MA` prefix, `\"Item\"` for `MO` prefix),\
    \ `code: String` (formats the raw stored code as `\"XX-XXXX-XXXX-XXXX\"` by inserting\
    \ dashes after the 2-char prefix then every 4 characters, e.g. `\"MA667931515180\"\
    ` \u2192 `\"MA-6679-3151-5180\"`)\n- `CollectionMoreDetailViewModel`, `rows`,\
    \ `Row.critters`, `Row.designs`\n- `Tabs.more`\n- `MessageView(string:)`, `MessageView(collectionName:)`,\
    \ `MessageView(noResultsFor:)`\n\n### Xcode Project Note\n\nThis is a traditional\
    \ Xcode project (not SwiftPM). New `.swift` files must be registered in `project.pbxproj`\
    \ or they will not compile.\n"
  image_name: marvdeng/anvil-images:ACHNBrowserUI.task-10
