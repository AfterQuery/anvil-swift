  problem_statement: "## Feature: Add a Dashboard view summarizing game progress and\
    \ marketplace activity\n\n### Problem Description\n\nThe **ACHNBrowserUI** app\
    \ has no centralized overview of the player's progress. Users must navigate between\
    \ multiple tabs to check critter collection status, turnip prices, or marketplace\
    \ listings. There is no single screen that aggregates this information, and the\
    \ app opens to the Catalog tab by default.\n\n### Acceptance Criteria\n\n1. A\
    \ Dashboard view is visible in the main tab navigation as the first and default\
    \ tab.\n2. Critter counts and collection progress render correctly from existing\
    \ data models and services.\n3. Turnip island and marketplace listings populate\
    \ using existing services.\n4. The app builds and runs without regressions.\n\n\
    ### Required API Surface\n\nThe implementation must expose these names (tests\
    \ depend on them to compile):\n\n- `DashboardViewModel` \u2014 ObservableObject;\
    \ `recentListings`, `island`, `fishes`, `bugs`, `fossils`, `fetchListings()`,\
    \ `fetchIsland()`, `fetchCritters()`\n- `TabbarView.Tab.dashboard`\n- `Categories.fish()\
    \ -> Categories`, `Categories.bugs() -> Categories`\n- `Listing.name`, `Listing.img`\n\
    - `NookazonService.recentListings()`\n\n### Xcode Project Note\n\nThis is a traditional\
    \ Xcode project (not SwiftPM). New `.swift` files must be registered in `project.pbxproj`\
    \ or they will not compile.\n"
  image_name: marvdeng/anvil-images:ACHNBrowserUI.task-6
- instance_id: ACHNBrowserUI.task-7
  repo_name: ACHNBrowserUI
  base_commit: 87dace0a0d0a120fd81d651e36bd45c4cc95470b
  problem_statement: "## Feature: Add Turnip Exchange listings and improve catalog\
    \ navigation\n\n### Problem Description\n\nThe **ACHNBrowserUI** app does not\
    \ expose Turnip Exchange island listings anywhere in the UI, even though a `TurnipExchangeService`\
    \ exists to fetch the data. Users must leave the app to check turnip market opportunities.\n\
    \nAdditionally, catalog browsing is fragmented across multiple top-level tabs\
    \ (Items, Wardrobe, Nature), each using a modal category picker. This flat structure\
    \ makes it difficult to explore items across category groups and doesn't scale\
    \ as new sections are added.\n\n### Acceptance Criteria\n\n1. Users can access\
    \ a Turnips section from the main tab navigation.\n2. The section displays island\
    \ listings fetched from the Turnip Exchange service, with a loading state while\
    \ data is unavailable.\n3. Catalog browsing supports hierarchical drill-down navigation\
    \ across category groups. This is achieved by changing the `Items` tab to use\
    \ `CategoriesView` (a drill-down list) instead of the old modal picker \u2014\
    \ do not remove or rename the existing `TabbarView.Tab` cases (`.items`, `.wardrobe`,\
    \ `.nature`, `.villagers`, `.collection`); add `.turnips` as a new case alongside\
    \ them.\n4. Individual item lists can be reached by navigating through category\
    \ groups.\n5. The island model handles missing descriptions gracefully.\n6. Existing\
    \ functionality (villagers, collection) remains intact.\n7. The app builds and\
    \ runs without regressions.\n\n### Required API Surface\n\nThe implementation\
    \ must expose these names (tests depend on them to compile):\n\n- `TurnipsViewModel`\
    \ \u2014 ObservableObject; `islands`, `fetch()`\n- `TabbarView.Tab.turnips`\n\
    - `Island.islandDescription`\n- `CategoriesView(categories: [Categories])` \u2014\
    \ the old `selectedCategory: Binding<Categories>` parameter is removed; navigation\
    \ is now drill-down via `NavigationLink`, not a modal sheet\n- `CategoryDetailView(categories:\
    \ [Categories])`\n- `ItemsListView(viewModel: ItemsViewModel)` \u2014 the old\
    \ `categories: [Categories]` parameter is replaced with an externally-supplied\
    \ view model\n\n### Xcode Project Note\n\nThis is a traditional Xcode project\
    \ (not SwiftPM). New `.swift` files must be registered in `project.pbxproj` or\
    \ they will not compile.\n"
  image_name: marvdeng/anvil-images:ACHNBrowserUI.task-7
