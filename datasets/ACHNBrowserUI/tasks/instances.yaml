  problem_statement: "## Fix: Turnip price columns are misaligned across rows\n\n\
    ### Problem Description\n\nIn the **ACHNBrowserUI** app, the Turnips price prediction\
    \ section displays daily AM/PM price estimates. Each row in the table independently\
    \ positions its columns, which causes the AM and PM values to not align vertically\
    \ across rows. This creates a jagged, hard-to-read layout.\n\nThe misalignment\
    \ affects all three display modes: average prices, min/max prices, and profits.\n\
    \n### Acceptance Criteria\n\n1. The AM and PM columns must be consistently aligned\
    \ under their headers across all rows.\n2. The unified layout must be used for\
    \ all three display modes (average, min/max, profits).\n3. Do not change the chart\
    \ views, island views, or other unrelated sections of the turnip price screen.\n\
    \n### Required API Surface\n\nThe implementation must expose these names (tests\
    \ depend on them to compile):\n\n- `GridStack` \u2014 SwiftUI View; `init(rows:columns:spacing:content:)`\
    \ where `spacing: CGFloat? = nil` (default is `nil`, not `0`); stored properties\
    \ `rows: Int`, `columns: Int`, `spacing: CGFloat?`; content closure callable as\
    \ `content(row, col)`\n\n### Xcode Project Note\n\nThis is a traditional Xcode\
    \ project (not SwiftPM). When you add or remove `.swift` files, you must also\
    \ update `project.pbxproj` to register/unregister them in the build target.\n"
  image_name: marvdeng/anvil-images:ACHNBrowserUI.task-2
- instance_id: ACHNBrowserUI.task-3
