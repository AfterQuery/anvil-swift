  problem_statement: "## Feature: Help users identify critters available right now\n\
    \n### Problem Description\n\nIn the **ACHNBrowserUI** app, the Active Critters\
    \ view has a \"To Catch\" section that lists all critters available during the\
    \ current month. However, many critters are only active during specific time windows\
    \ within the day (e.g., evening-only fish). Users have to manually cross-reference\
    \ each critter's active hours to figure out which ones they can actually go catch\
    \ right now versus ones they'll need to wait for.\n\nThis makes it difficult to\
    \ quickly plan a catching session.\n\n### Acceptance Criteria\n\n1. Items must\
    \ be able to determine whether they are active at the current hour, not just the\
    \ current month.\n2. The \"To Catch\" list must be split into two groups: critters\
    \ catchable right now and critters catchable later this month.\n3. The old combined\
    \ \"To catch\" section must be replaced \u2014 the view should display separate\
    \ \"To catch now\" and \"To catch later\" sections.\n4. Both fish and bugs should\
    \ be handled consistently.\n5. French localization strings must be provided for\
    \ the new section titles.\n6. The existing behavior for other sections (e.g.,\
    \ \"New this month\", \"Leaving this month\", \"Caught\") must remain unchanged.\n\
    \n### Required API Surface\n\nThe implementation must expose these names (tests\
    \ depend on them to compile):\n\n- `Item.isActiveAtThisHour()`, `Item.isActiveThisMonth()`,\
    \ `[Item].filterActiveThisMonth()`\n- `ActiveCrittersViewModel.CritterInfo` \u2014\
    \ `toCatchNow`, `toCatchLater`\n- French: `\"To catch now\"`, `\"To catch later\"\
    ` in `fr.lproj/Localizable.strings`\n"
  image_name: marvdeng/anvil-images:ACHNBrowserUI.task-1
- instance_id: ACHNBrowserUI.task-10
