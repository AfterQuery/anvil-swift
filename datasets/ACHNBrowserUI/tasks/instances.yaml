  problem_statement: "## Feature: Add custom chores and to-dos to the dashboard\n\n\
    ### Problem Description\n\nThe dashboard currently tracks only predefined Daily\
    \ Tasks. Users cannot add their own reminders, such as sending gifts, crafting\
    \ items, or selling to NPCs. The app needs a lightweight todo list to track arbitrary\
    \ player-defined chores.\n\n### Acceptance Criteria\n\n1. Users can create chores\
    \ with a title, description, and completion status.\n2. Users can add, view, toggle\
    \ completion, delete, and reset chores.\n3. A chore form supports both creating\
    \ new chores and editing existing ones.\n4. A chore list view shows current chores,\
    \ hides the reset button when no chores are finished, and shows an empty-state\
    \ view when there are no chores.\n5. The dashboard shows a chores section with\
    \ total and completed chore counts as a progress ratio.\n6. Chores appear in the\
    \ default dashboard section list.\n7. The implementation integrates with existing\
    \ dashboard/task functionality without altering Daily Tasks or other sections.\n\
    \n### Required API Surface\n\nThe implementation must expose these names (tests\
    \ depend on them to compile):\n\n- `Chore` \u2014 `title`, `description`, `isFinished`;\
    \ Identifiable, Equatable\n- `UserCollection.chores`, `addChore`, `toggleChore`,\
    \ `resetChores`, `deleteChore(at:)`\n- `ChoreFormViewModel(chore: Chore?)`, `chore`\n\
    - `ChoreListViewModel` \u2014 `chores`, `shouldShowResetButton`, `shouldShowDescriptionView`\n\
    - `TodayChoresSectionViewModel` \u2014 `chores`, `totalChoresCount`, `completeChoresCount`\n\
    - `TodaySection.Name.chores`\n\n### Xcode Project Note\n\nThis is a traditional\
    \ Xcode project (not SwiftPM). When you add new `.swift` files, you must also\
    \ update `project.pbxproj` to register them in the appropriate build target.\n"
  image_name: marvdeng/anvil-images:ACHNBrowserUI.task-5
