  base_commit: 3eba9512b0fb430d2507e27df3f8311d3bd67706
  image_name: marvdeng/anvil-images:ACHNBrowserUI.task-1
  problem_statement: "## Feature: Help users identify critters available right now\n\
    \n### Problem Description\n\nIn the **ACHNBrowserUI** app, the Active Critters
    view has a \"To Catch\" section that lists all critters available during the current
    month. However, many critters are only active during specific time windows within
    the day (e.g., evening-only fish). Users have to manually cross-reference each
    critter's active hours to figure out which ones they can actually go catch right
    now versus ones they'll need to wait for.\n\nThis makes it difficult to quickly
    plan a catching session.\n\n### Acceptance Criteria\n\n1. Critters must be checkable
    for whether they are active at the current hour/time of day, not just the current
    month.\n2. The \"To Catch\" list must be split into two groups: critters catchable
    right now and critters catchable later this month.\n3. The old combined \"To catch\"\
    \ section must be replaced — the view should display \"To catch now\" and \"To
    catch later\" as separate sections.\n4. Both fish and bugs should be handled consistently.\n\
    5. French localization strings must be provided for the new section titles.\n\
    6. The existing behavior for other sections (e.g., \"New this month\", \"Leaving
    this month\", \"Caught\") must remain unchanged.\n"
  before_repo_set_cmd: ''
- instance_id: ACHNBrowserUI.task-2
  repo_name: ACHNBrowserUI
  base_commit: 31b3185f7435e9f1c208ad7c0c726a54652ca791
  image_name: marvdeng/anvil-images:ACHNBrowserUI.task-2
  problem_statement: '## Fix: Turnip price columns are misaligned across rows


    ### Problem Description


    In the **ACHNBrowserUI** app, the Turnips price prediction section displays daily
    AM/PM price estimates. Each row in the table independently positions its columns,
    which causes the AM and PM values to not align vertically across rows. This creates
    a jagged, hard-to-read layout.


    The misalignment affects all three display modes: average prices, min/max prices,
    and profits.


    ### Acceptance Criteria


    1. The AM and PM columns must be consistently aligned under their headers across
    all rows using a unified grid or column-aligned layout.

    2. The unified layout must be used for all three display modes (average, min/max,
    profits).

    3. The old separate row view files in the `rows/` directory must be removed, along
    with any references to those components from the turnip price view.

    4. Any workarounds that existed solely to support the old row-based layout should
    be removed.

    5. Do not change the chart views, island views, or other unrelated sections of
    the turnip price screen.

    '
  before_repo_set_cmd: ''
- instance_id: ACHNBrowserUI.task-3
  repo_name: ACHNBrowserUI
  base_commit: 3d11674846dd9ad905de616782134b0a76a4e148
  image_name: marvdeng/anvil-images:ACHNBrowserUI.task-3
  problem_statement: '## Feature: Track per-variant collection progress for items


    ### Problem Description


    In the **ACHNBrowserUI** app, the favorite (star) system for items is binary:
    an item is either liked or not. However, many catalog items have multiple color
    or style variants. Users have no way to tell from the UI whether they have collected
    some but not all variants of a particular item, and tapping the favorite button
    on a multi-variant item simply toggles the parent item rather than letting users
    select specific variants.


    This makes it difficult to track per-variant collection progress.


    ### Acceptance Criteria


    1. The like system must support three visual states for multi-variant items: no
    variants collected, some variants collected (partial), and all variants collected
    (complete).

    2. Each state must use a distinct icon so users can see collection progress at
    a glance.

    3. Tapping the favorite button on a multi-variant item must present a variant
    selection UI rather than directly toggling the parent item.

    4. The variant selection UI must be accessible from both the item list and the
    item detail view.

    5. Liking the first variant of an item must automatically add the parent item
    to the collection. Unliking the last variant must automatically remove it.

    6. The icon state must update immediately when variants are toggled.

    7. Items with zero or one variant must retain the existing binary like behavior
    and not show partial states.

    '
  before_repo_set_cmd: ''
- instance_id: ACHNBrowserUI.task-4
  repo_name: ACHNBrowserUI
  base_commit: 89ac53bfe6d0769411f4005060e8974fa8fd35d4
  image_name: marvdeng/anvil-images:ACHNBrowserUI.task-4
  problem_statement: '## Feature: Add sorting options to the Villagers list


    ### Problem Description


    In the **ACHNBrowserUI** app, the Villagers list view displays all villagers but
    provides no way to sort them. Users who want to find villagers by name or browse
    by species have to manually scan through the entire unsorted list.


    ### Acceptance Criteria


    1. Users must be able to sort villagers by name (alphabetical by localized name)
    and by species (alphabetical).

    2. Sorting must use locale-aware string comparison.

    3. A sort button in the navigation bar must present the available sort options
    (e.g., via an action sheet).

    4. The sort button icon must visually indicate whether a sort is currently active.

    5. Selecting the same sort option a second time must reverse the sort order.

    6. There must be a way to clear the active sort, restoring the default villager
    order.

    7. When searching, search results must take priority over sorting.

    8. French localization must be added for any new user-facing sort strings.

    9. The existing search functionality and villager detail view must remain unchanged.

    '
  before_repo_set_cmd: ''
