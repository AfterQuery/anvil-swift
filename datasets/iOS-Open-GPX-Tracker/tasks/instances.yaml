- instance_id: iOS-Open-GPX-Tracker.task-1
  repo_name: iOS-Open-GPX-Tracker
  base_commit: 3d3ae151d854187f5e0090dc08faf4246473df7d
  problem_statement: "## Bug: Scalebar and label colors not adapting to tile server\
    \ background\n\n### Problem Description\n\nIn the **iOS-Open-GPX-Tracker** app,\
    \ the map overlay text (status labels) and the custom scalebar determine their\
    \ color based on whether the system is in dark mode or light mode. However, different\
    \ tile servers have inherently dark or light map imagery regardless of the system\
    \ appearance setting, which makes the overlay elements hard to read in certain\
    \ combinations.\n\nFor example:\n- **Apple Satellite** tiles have dark imagery,\
    \ but in light mode the scalebar and labels are black \u2014 nearly invisible\
    \ against the dark map.\n- **OpenStreetMap** and similar tiles have light imagery,\
    \ but in dark mode the scalebar and labels are white \u2014 washed out against\
    \ the light map.\n\n### Acceptance Criteria\n\n1. The scalebar must support having\
    \ its color overridden based on the tile server, rather than always using system-adaptive\
    \ colors.\n2. The tile server selection must drive the scalebar's color \u2014\
    \ when the user switches tile servers, the scalebar color must update accordingly.\n\
    3. Dark-themed tile servers (e.g., Apple Satellite) must use white overlay elements\
    \ (scalebar, labels).\n4. Light-themed tile servers (e.g., OpenStreetMap) must\
    \ use black overlay elements.\n5. The default Apple map tile server should continue\
    \ to follow the system appearance mode.\n\n### Required API Surface\n\nThe implementation\
    \ must expose these names (tests depend on them to compile):\n\n- `GPXTileServer.GPXTileServerColorMode`\
    \ \u2014 `.lightMode`, `.system`, `.darkMode`\n- `GPXTileServer.colorMode`\n-\
    \ `GPXScaleBar.forcedColor`\n- `ViewController.textColorAdaptations()` \u2014\
    \ applies tile-server-driven colors to labels and scale bar"
  image_name: marvdeng/anvil-images:iOS-Open-GPX-Tracker.task-1
- instance_id: iOS-Open-GPX-Tracker.task-10
  repo_name: iOS-Open-GPX-Tracker
  base_commit: a9aa34ff04091f0111d978f5b206f682a8a92566
  problem_statement: "## Feature: Add custom output folder selection for GPX files\n\
    \n### Problem Description\n\nThe **iOS-Open-GPX-Tracker** app saves all recorded\
    \ GPX files to the app's internal Documents directory. There is no way for users\
    \ to choose a different storage location. Users who want their tracks saved to\
    \ a cloud-synced folder (e.g., iCloud Drive, Dropbox) or a specific local directory\
    \ must manually move files after each recording session.\n\n### Expected Behavior\n\
    \n- A new \"GPX Files Location\" section appears in the preferences screen, allowing\
    \ users to select a custom output folder.\n- Tapping the preference opens a system\
    \ folder picker so users can choose any accessible directory.\n- Once a custom\
    \ folder is selected, the preference cell displays the chosen folder's name.\n\
    - The selected folder is persisted across app launches.\n- The GPX file list aggregates\
    \ files from both the default and custom directories.\n- New GPX files are saved\
    \ to the custom folder when one is set.\n\n### Acceptance Criteria\n\n1. A \"\
    GPX Files Location\" section is visible in the preferences table.\n2. Selecting\
    \ a folder persists the choice and updates the cell's subtitle.\n3. The file list\
    \ includes GPX files from both the default and custom directories.\n4. The preference\
    \ survives app restarts.\n5. The app builds and runs without regressions.\n\n\
    ### Required API Surface\n\nThe implementation must expose these names (tests\
    \ depend on them to compile):\n\n- `kDefaultsKeyGPXFilesFolder`\n- `Preferences.shared.gpxFilesFolderURL`\n\
    - `kGPXFilesLocationSection`\n- `PreferencesTableViewController` \u2014 UIDocumentPickerDelegate"
  image_name: marvdeng/anvil-images:iOS-Open-GPX-Tracker.task-10
- instance_id: iOS-Open-GPX-Tracker.task-2
  repo_name: iOS-Open-GPX-Tracker
  base_commit: 9ca33065e6a0d56f4a5db17ae20e9d143aa86e2f
  problem_statement: "## Feature: Add localization support for internationalization\n\
    \n### Problem Description\n\nThe **iOS-Open-GPX-Tracker** app contains hard-coded\
    \ user-facing strings throughout the codebase. Button labels, alert messages,\
    \ screen titles, and other text are embedded directly in the source code. This\
    \ prevents the app from being translated into other languages and blocks community\
    \ contributions for localization.\n\n### Expected Behavior\n\n- All user-facing\
    \ strings in the iOS app and Apple Watch extension support translation.\n- The\
    \ app displays text according to the user's device language when a translation\
    \ is available.\n- Buttons and labels accommodate longer translated text without\
    \ layout issues.\n\n### Acceptance Criteria\n\n1. User-facing strings in view\
    \ controllers, alerts, and the Watch extension are localizable.\n2. At least one\
    \ additional language is supported alongside English.\n3. The app builds and runs\
    \ without regressions.\n\n### Required API Surface\n\nThe implementation must\
    \ expose these names (tests depend on them to compile):\n\n- `kNoFiles` \u2014\
    \ localized using the key `\"NO_FILES\"`\n- `kNotGettingLocationText` \u2014 localized\
    \ using the key `\"NO_LOCATION\"`\n\n### Localization Keys\n\nUse these exact\
    \ keys in `Localizable.strings` (in both `en.lproj` and at least one additional\
    \ `.lproj`):\n\n- `NO_FILES` = \"No gpx files\"\n- `NO_LOCATION` = \"Not getting\
    \ location\"\n- `START_TRACKING` = \"Start Tracking\"\n"
  image_name: marvdeng/anvil-images:iOS-Open-GPX-Tracker.task-2
- instance_id: iOS-Open-GPX-Tracker.task-3
