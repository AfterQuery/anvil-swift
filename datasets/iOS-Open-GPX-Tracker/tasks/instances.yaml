- instance_id: iOS-Open-GPX-Tracker.task-2
  repo_name: iOS-Open-GPX-Tracker
  base_commit: 19f7c55db93c8526649b783c7bd8a3e480bf5628
  image_name: marvdeng/anvil-images:iOS-Open-GPX-Tracker.task-2
  problem_statement: '## Modernization: Replace deprecated UIAlertView usage with
    UIAlertController


    ### Problem Description


    The **iOS-Open-GPX-Tracker** application uses `UIAlertView` to present alert dialogs
    in several places (e.g., saving a GPX session, editing waypoint names, location
    services denied/disabled alerts). `UIAlertView` has been deprecated since iOS
    9 and is no longer supported in modern iOS development. Continuing to use it can
    cause compatibility issues, compiler warnings, and runtime problems on newer iOS
    versions.


    ### Acceptance Criteria


    1. `UIAlertView` must not appear anywhere in the codebase.

    2. `UIAlertViewDelegate` must not appear anywhere in the codebase.

    3. Every file that previously used `UIAlertView` must be migrated to use `UIAlertController`.

    4. The delegate-callback pattern for handling button taps must be replaced with
    inline action handlers.

    5. All user-facing behavior and messaging must remain the same (same titles, messages,
    button labels, and actions).

    6. Alerts must be presented from the appropriate view controller within the current
    navigation flow.

    '
  before_repo_set_cmd: ''
- instance_id: iOS-Open-GPX-Tracker.task-3
  repo_name: iOS-Open-GPX-Tracker
  base_commit: 72c1e361d4ab27c71e46d1384dcaa29dea667f3c
  image_name: marvdeng/anvil-images:iOS-Open-GPX-Tracker.task-3
  problem_statement: '## Feature: Add a map scale indicator and fix deprecated location
    authorization check


    ### Problem Description


    The **iOS-Open-GPX-Tracker** map view currently has no scale indicator, making
    it difficult for users to judge distances on the map. Users need a visual reference
    that updates as they zoom in and out.


    Additionally, the location authorization check uses the deprecated `CLLocationManager.authorizationStatus()`
    class method. Since iOS 14, the preferred approach is to use the instance-level
    `locationManager.authorizationStatus` property instead.


    ### Acceptance Criteria


    1. A scale bar using MapKit''s built-in `MKScaleView` must be added to the map
    view and displayed on screen.

    2. The scale bar must be linked to the existing map so it automatically updates
    as the user zooms in and out.

    3. All calls to the deprecated `CLLocationManager.authorizationStatus()` class
    method must be replaced with the instance-level `locationManager.authorizationStatus`
    property.

    4. Obsolete `#available(iOS 10, *)` checks that are no longer needed given the
    app''s current minimum deployment target must be removed.

    5. The user-facing alert behavior must remain the same.

    '
  before_repo_set_cmd: ''
- instance_id: iOS-Open-GPX-Tracker.task-4
  repo_name: iOS-Open-GPX-Tracker
  base_commit: fa320f1cc5cfe1e58ac538c22e5165a08dc34b8a
  image_name: marvdeng/anvil-images:iOS-Open-GPX-Tracker.task-4
  problem_statement: "## Bug: UI components fail to adapt correctly to orientation\
    \ changes on iPad\n\n### Problem Description\n\nIn the **iOS-Open-GPX-Tracker**\
    \ app, there is a bug regarding how the UI handles device orientation changes\
    \ on iPad. While the map itself rotates correctly, the overlaying UI elements\
    \ do not maintain their intended layout, leading to visual issues.\n\n### Observed\
    \ Behavior\n\n- **Button Bar Overlap**: When transitioning between portrait and\
    \ landscape on iPad, the bottom button bar (containing \"Start Tracking,\" \"\
    Save,\" and \"Reset\") fails to recalculate its spacing, resulting in buttons\
    \ overlapping or becoming too compressed to use.\n- **Compass Misalignment**:\
    \ The compass view moves out of its designated position upon rotation, sometimes\
    \ disappearing or floating at incorrect coordinates.\n- **Label Truncation**:\
    \ Status labels (such as the time and coordinate labels at the top) may truncate\
    \ or have incorrect padding from the edges when the width changes.\n- **Static\
    \ Layout**: The current implementation relies on manual frame calculations and\
    \ device-specific checks (like `IsIPhoneX`) that don't account for the dynamic\
    \ size classes of various iPad models.\n\n### Acceptance Criteria\n\n1. The layout\
    \ must be migrated from manual frame calculations and `autoresizingMask` to Auto\
    \ Layout constraints so that all UI elements adapt dynamically to size changes.\n\
    2. Buttons must not use hardcoded frame or center assignments \u2014 their positions\
    \ must be defined by constraints relative to the view.\n3. Status labels must\
    \ not use hardcoded frame assignments \u2014 they must remain anchored to their\
    \ relative positions as the view resizes.\n4. The view controller must respond\
    \ to orientation transitions and update the layout accordingly, without requiring\
    \ arbitrary delays.\n5. The compass must reposition correctly when the orientation\
    \ changes, remaining in its designated location.\n6. The layout must work correctly\
    \ across different screen sizes (including iPad Pro models and iPhone X+) without\
    \ device-specific conditionals.\n"
  before_repo_set_cmd: ''
