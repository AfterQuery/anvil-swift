  base_commit: 72c1e361d4ab27c71e46d1384dcaa29dea667f3c
  problem_statement: "## Feature: Add a map scale indicator and clean up obsolete\
    \ version checks\n\n### Problem Description\n\nThe **iOS-Open-GPX-Tracker** map\
    \ view currently has no scale indicator, making it difficult for users to judge\
    \ distances on the map. Users need a visual reference that updates as they zoom\
    \ in and out.\n\nAdditionally, the codebase contains obsolete `#available(iOS\
    \ 10, *)` version checks that are no longer needed given the app's current minimum\
    \ deployment target.\n\n### Acceptance Criteria\n\n1. A scale indicator must be\
    \ visible on the map and update automatically as the user zooms in and out.\n\
    2. The indicator must be properly positioned using Auto Layout and adapt to layout\
    \ changes.\n3. Obsolete version checks no longer needed for the app's deployment\
    \ target must be removed.\n4. The user-facing alert behavior must remain the same.\n\
    \n### Required API Surface\n\nThe implementation must expose this name (tests\
    \ depend on it to compile):\n\n- `ViewController.scaleBar` \u2014 MKScaleView\n"
  image_name: marvdeng/anvil-images:iOS-Open-GPX-Tracker.task-3
- instance_id: iOS-Open-GPX-Tracker.task-4
  repo_name: iOS-Open-GPX-Tracker
  base_commit: fa320f1cc5cfe1e58ac538c22e5165a08dc34b8a
  problem_statement: '## Bug: UI components fail to adapt correctly to orientation
    changes on iPad


    ### Problem Description


    In the **iOS-Open-GPX-Tracker** app, there is a bug regarding how the UI handles
    device orientation changes on iPad. While the map itself rotates correctly, the
    overlaying UI elements do not maintain their intended layout, leading to visual
    issues.


    ### Observed Behavior


    - **Button Bar Overlap**: When transitioning between portrait and landscape on
    iPad, the bottom button bar fails to recalculate its spacing, resulting in buttons
    overlapping or becoming too compressed.

    - **Compass Misalignment**: The compass view moves out of its designated position
    upon rotation.

    - **Label Truncation**: Status labels may truncate or have incorrect padding when
    the width changes.


    ### Acceptance Criteria


    1. UI elements must adapt dynamically to size and orientation changes using Auto
    Layout.

    2. Buttons, labels, and the compass must maintain correct positions and spacing
    across orientation transitions.

    3. The layout must work correctly across different screen sizes (iPad Pro, iPhone
    X+, etc.).

    4. The view controller must update layout when orientation changes.


    ### Required API Surface


    The implementation must expose this name (tests depend on it to compile):


    - `ViewController.addConstraints(_ isIPhoneX: Bool)`

    '
  image_name: marvdeng/anvil-images:iOS-Open-GPX-Tracker.task-4
