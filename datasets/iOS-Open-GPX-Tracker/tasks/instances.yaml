  problem_statement: "## Bug: Scalebar color not correctly adapting to tile server
    background\n\n### Problem Description\n\nThe map scalebar color is currently determined
    using the system appearance mode (dark vs. light). Specifically:\n\n- **White**
    is used in dark mode  \n- **Black** is used in light mode  \n\nHowever, this behavior
    leads to poor visibility when certain tile providers are used, because their map
    backgrounds do not match the system appearance.\n\n### Incorrect Behavior\n\n\
    The scalebar color is not legible in the following cases:\n\n#### Apple Satellite
    tiles\n- The imagery is dark.  \n- The scalebar becomes black in light mode, making
    it difficult to see.  \n- **Expected:** scalebar should always be **white**.\n\
    \n#### OpenStreetMap and similar light-themed tiles\n- The imagery is light. \
    \ \n- The scalebar becomes white in dark mode, reducing contrast.  \n- **Expected:**
    scalebar should always be **black**.\n\n### Expected Behavior\n\nThe scalebar
    color should adapt to the tile provider rather than the system appearance."
