  base_commit: 8e87edced43cb8292475510587b8dc82cb6e9e5c
  problem_statement: "## Feature: Custom default file name format in preferences\n\
    \n### Problem Description\n\nThe **iOS-Open-GPX-Tracker** app uses a hardcoded\
    \ date format when generating default file names for saved GPX sessions. Users\
    \ have no way to customize this format, which is inconvenient for those who prefer\
    \ ISO 8601 timestamps, 24-hour time, or other naming conventions.\n\n### Expected\
    \ Behavior\n\n- A new \"Default Name\" section appears in the preferences table,\
    \ linking to a dedicated setup screen.\n- Users can choose from preset date/time\
    \ format patterns or enter a custom format string.\n- A live preview shows the\
    \ current date/time rendered in the selected format.\n- The selected format persists\
    \ across app launches and is applied when generating default file names.\n- Invalid\
    \ or malformed patterns are handled gracefully instead of crashing.\n\n### Acceptance\
    \ Criteria\n\n1. A \"Default Name\" section is visible in the main preferences\
    \ table.\n2. Preset formats are selectable with a live date/time preview.\n3.\
    \ Custom format input produces correct file names.\n4. The app builds and runs\
    \ without regressions.\n\n### Required API Surface\n\nThe implementation must\
    \ expose these names (tests depend on them to compile):\n\n- `DefaultDateFormat`\
    \ \u2014 `getDateFormat(unprocessed:)`, `getDate(processedFormat:)`\n- `DateField`\
    \ \u2014 `type`, `patterns`, `subtitles`\n- `String.countInstances(of:)`\n- `kDefaultNameSection`\n\
    - `DefaultNameSetupViewController`"
  image_name: marvdeng/anvil-images:iOS-Open-GPX-Tracker.task-5
- instance_id: iOS-Open-GPX-Tracker.task-6
  repo_name: iOS-Open-GPX-Tracker
  base_commit: df8dd1e25fbd28bd5496f3bc23d06922474396e3
  problem_statement: "## Fix: Auto-reload file list when GPX files are received externally\n\
    \n### Problem Description\n\nIn the **iOS-Open-GPX-Tracker** app, when a user\
    \ receives a GPX file via AirDrop or from the paired Apple Watch while the file\
    \ list view is open, the table view does not update to show the new file. The\
    \ user must close and reopen the file list to see it. Additionally, WatchConnectivity\
    \ session management is handled in the ViewController, which means file transfers\
    \ from the Apple Watch cannot be processed when the app is in the background or\
    \ the main view controller is not active.\n\n### Expected Behavior\n\n- When a\
    \ GPX file is received via AirDrop or from the Apple Watch, the file list table\
    \ view automatically reloads to show the new file.\n- The user is notified when\
    \ a file is received from Apple Watch.\n- File transfers from the Apple Watch\
    \ work regardless of which view is active.\n\n### Acceptance Criteria\n\n1. The\
    \ file list updates immediately when a file arrives via AirDrop or Apple Watch\
    \ transfer.\n2. The user is notified when a file is received from Apple Watch.\n\
    3. The app builds and runs without regressions.\n\n### Required API Surface\n\n\
    The implementation must expose these names (tests depend on them to compile):\n\
    \n- `Notification.Name.didReceiveFileFromURL`\n- `Notification.Name.didReceiveFileFromAppleWatch`\n\
    - `GPXFilesTableViewController.reloadTableData()`\n- `AppDelegate` \u2014 must\
    \ conform to `WCSessionDelegate`"
  image_name: marvdeng/anvil-images:iOS-Open-GPX-Tracker.task-6
- instance_id: iOS-Open-GPX-Tracker.task-7
  repo_name: iOS-Open-GPX-Tracker
  base_commit: fbd582ed6af1ca637097ede12078c8ef2be88c60
  problem_statement: '## Feature: "Screen always on" preference and loading indicator
    for preferences screen


    ### Problem Description


    The **iOS-Open-GPX-Tracker** app has two user-facing issues related to preferences
    and screen behavior:


    1. **No "keep screen on" option.** When tracking a route, the device screen dims
    and locks after the system idle timeout. Users lose sight of the live map and
    must repeatedly wake the device to check their position. There is no in-app setting
    to prevent this.


    2. **Preferences screen appears to hang.** Opening the preferences screen calculates
    the tile cache size synchronously on the main thread. When the cache is large
    (e.g., 1 GB), this blocks the UI for several seconds with no visual feedback,
    making users think the button did nothing.


    ### Expected Behavior


    - A "Keep screen always on" toggle is available in the app''s preferences under
    a new "Screen" section.

    - When enabled, the device screen stays on while the app is in the foreground.

    - The preference persists across app launches and is applied when the app starts.

    - Opening the preferences screen shows a loading indicator while it initializes,
    so the user gets immediate feedback even if initialization is slow.

    - The loading indicator disappears once the preferences screen is ready to present.


    ### Acceptance Criteria


    1. A new preferences section for screen behavior is visible in the preferences
    table.

    2. Toggling the setting keeps the screen awake or restores default idle timer
    behavior.

    3. The preference is persisted and restored on app launch.

    4. A loading indicator appears while the preferences screen loads and disappears
    once it is presented.

    5. The app builds and runs without regressions.


    ### Required API Surface


    The implementation must expose these names (tests depend on them to compile):


    - `Preferences.shared.keepScreenAlwaysOn`

    - `kDefaultsKeyKeepScreenAlwaysOn`

    - `kScreenSection`

    - `Toast.kDisabledDelay`

    - `Toast.showLoading(_:)`, `Toast.hideLoading()`'
  image_name: marvdeng/anvil-images:iOS-Open-GPX-Tracker.task-7
- instance_id: iOS-Open-GPX-Tracker.task-8
  repo_name: iOS-Open-GPX-Tracker
  base_commit: b63c5109ee5a3a6c6e93703d26e5b5255b68205f
  problem_statement: "## Feature: Auto-recover last track on launch with toast notifications\n\
    \n### Problem Description\n\nIn the **iOS-Open-GPX-Tracker** app, when a previously\
    \ recorded session is recovered from Core Data upon launch, the app presents a\
    \ blocking dialog asking the user whether to continue the session. This interrupts\
    \ the startup flow, especially for users who always want to resume tracking.\n\
    \nAdditionally, the app has no lightweight, non-intrusive notification system\
    \ for informing users about transient events (like file recovery, errors, or successful\
    \ saves). All user feedback relies on modal alert dialogs, which require explicit\
    \ dismissal.\n\n### Expected Behavior\n\n- When the app launches and detects a\
    \ recoverable session, it automatically loads the session without presenting a\
    \ dialog.\n- A non-blocking toast notification briefly appears informing the user\
    \ that the previous session was recovered.\n- A reusable toast notification system\
    \ is available with multiple severity levels and auto-dismissal.\n- The app title\
    \ bar updates to display the current session filename instead of always showing\
    \ the default app title.\n- The app title reverts to the default when the session\
    \ is reset.\n\n### Acceptance Criteria\n\n1. Recoverable sessions load automatically\
    \ on launch without a confirmation dialog \u2014 the blocking recovery dialog\
    \ must be removed.\n2. A toast notification informs the user of the automatic\
    \ recovery.\n3. The toast system supports multiple severity levels with distinct\
    \ styling, and each toast must be visible on screen.\n4. The app title label reflects\
    \ the current session filename.\n5. The app builds and runs without regressions.\n\
    \n### Required API Surface\n\nThe implementation must expose these names (tests\
    \ depend on them to compile):\n\n- `Toast` \u2014 `regular(_:)`, `info(_:)`, `warning(_:)`,\
    \ `success(_:)`, `error(_:)`\n- `Toast.Position` \u2014 `.bottom`, `.center`,\
    \ `.top`\n- `Toast.kDelayShort`, `Toast.kDelayLong`\n- `ToastLabel(text:)`\n-\
    \ `kAppTitle`\n- `ViewController.lastGpxFilename`, `ViewController.appTitleLabel`\n\
    - `CoreDataAlertView` must be **deleted**"
  image_name: marvdeng/anvil-images:iOS-Open-GPX-Tracker.task-8
- instance_id: iOS-Open-GPX-Tracker.task-9
  repo_name: iOS-Open-GPX-Tracker
  base_commit: 1d3f1b7199639ceaee5491d696f27dc7c22e44e8
  problem_statement: '## Feature: Add activity type selection to preferences


    ### Problem Description


    The **iOS-Open-GPX-Tracker** app uses `CLLocationManager` for GPS tracking but
    does not expose the `activityType` setting to users. The location manager defaults
    to `.other` (automatic), which may not produce optimal tracking accuracy for specific
    activities like driving, running, or flying. Users have no way to tell the system
    what kind of activity they are performing to improve GPS filtering behavior.


    ### Expected Behavior


    - A new "Activity Type" section appears in the preferences screen listing all
    available activity type options.

    - Each option displays a human-readable name and a brief description.

    - The currently selected activity type is indicated with a checkmark.

    - Selecting a different activity type persists the choice and updates the location
    manager.

    - The preference is saved and restored on app launch.


    ### Acceptance Criteria


    1. An "Activity Type" section is visible in the preferences table.

    2. All activity type options are listed with names and descriptions.

    3. Tapping a row updates the checkmark and persists the selection.

    4. The location manager uses the selected activity type for tracking.

    5. The app builds and runs without regressions.


    ### Required API Surface


    The implementation must expose these names (tests depend on them to compile):


    - `CLActivityType.name`, `CLActivityType.description`, `CLActivityType.count`

    - `kActivityTypeSection`

    - `kDefaultsKeyActivityType`

    - `Preferences.shared.locationActivityType`'
  image_name: marvdeng/anvil-images:iOS-Open-GPX-Tracker.task-9
