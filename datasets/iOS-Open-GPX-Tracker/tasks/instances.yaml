- instance_id: iOS-Open-GPX-Tracker.task-2
  repo_name: iOS-Open-GPX-Tracker
  base_commit: 19f7c55db93c8526649b783c7bd8a3e480bf5628
  image_name: marvindeng/anvil-images:iOS-Open-GPX-Tracker.task-2
  problem_statement: "### Title\n\nReplace deprecated UIAlertView usage with UIAlertController\n\
    \n### Background\n\nThe application currently uses `UIAlertView` to present alerts.\
    \  \n`UIAlertView` has been deprecated since iOS 9 and is no longer supported
    in modern iOS development.\n\nApple recommends using `UIAlertController` with
    `preferredStyle: .alert` or `.actionSheet`.\n\nContinuing to use deprecated APIs
    can cause compatibility issues, compiler warnings, and runtime problems on newer
    iOS versions.\n\n### Expected Behavior\n\nAll alert dialogs must be presented
    using `UIAlertController`.\n\nThe new implementation should:\n\n- present alerts
    from a view controller\n- use `UIAlertAction` handlers instead of delegate callbacks\n\
    - maintain the same user-facing behavior and alert flow\n\n### Requirements\n\n\
    - Remove all usages of `UIAlertView`.\n- Present alerts using `UIAlertController`.\n\
    - Do not change user-visible behavior or messaging.\n- Do not introduce deprecated
    APIs.\n- Ensure alerts are presented within the current navigation flow.\n"
  before_repo_set_cmd: ''
- instance_id: iOS-Open-GPX-Tracker.task-3
  repo_name: iOS-Open-GPX-Tracker
  base_commit: 72c1e361d4ab27c71e46d1384dcaa29dea667f3c
  image_name: marvindeng/anvil-images:iOS-Open-GPX-Tracker.task-3
  problem_statement: "## Title: Add MapKit scale bar and fix location status check
    warning\n\n### Problem Description\n\nThe map view currently has no scale indicator,
    making it difficult for users to judge distances on the map. MapKit provides `MKScaleView`,
    a built-in scale bar that automatically updates as the user zooms in and out.\n\
    \nAdditionally, the location authorization check in the ViewController uses the
    deprecated `CLLocationManager.locationServicesEnabled()` class method inside a
    `guard` statement, which produces a compiler warning on modern iOS versions. The
    check should use the instance-level `authorizationStatus` property instead.\n\n\
    ### Expected Behavior\n\n1. **Scale bar**: An `MKScaleView` should be added to
    the map view, positioned above the tracker button, and connected to the map so
    it reflects the current zoom level.\n\n2. **Location status check**: The deprecated
    `CLLocationManager.locationServicesEnabled()` guard should be replaced with a
    check on `authorizationStatus` (e.g., checking for `.denied`) to eliminate the
    compiler warning.\n\n### Constraints\n\n- Use MapKit's built-in `MKScaleView`
    for the scale bar — do not implement a custom one.\n- The scale bar must be linked
    to the existing map view.\n- Do not change user-facing alert behavior.\n- Remove
    any unnecessary iOS version availability checks that are no longer needed (the
    app's minimum deployment target has moved past them).\n"
  before_repo_set_cmd: ''
- instance_id: iOS-Open-GPX-Tracker.task-4
  repo_name: iOS-Open-GPX-Tracker
  base_commit: fa320f1cc5cfe1e58ac538c22e5165a08dc34b8a
  image_name: marvindeng/anvil-images:iOS-Open-GPX-Tracker.task-4
  problem_statement: "# UI components fail to adapt correctly to orientation changes
    on iPad\n\n## Description\nIn the **iOS-Open-GPX-Tracker** application, there
    is a regression/persistent bug regarding how the UI handles device orientation
    changes, specifically on iPad. While the map itself may rotate, the overlaying
    UI elements (the button bar, compass, and status labels) do not maintain their
    intended layout, leading to \"squashed\" or overlapping components.\n\n## Observed
    Behavior\n- **Button Bar Overlap**: When transitioning between portrait and landscape
    on an iPad, the bottom button bar (containing \"Start Tracking,\" \"Save,\" and
    \"Reset\") fails to recalculate its spacing. This results in buttons overlapping
    or becoming too compressed to use.  \n- **Compass Misalignment**: The compass
    view moves out of its designated position upon rotation, sometimes disappearing
    or floating in incorrect coordinates.  \n- **Label Truncation**: Status labels
    (such as the time and coordinate labels at the top) may truncate or have incorrect
    padding/distance from the edges when the width of the view changes.  \n- **Static
    Layout**: The current implementation relies on manual frame calculations or insufficient
    checks (like `IsIPhoneX`) that don't account for the dynamic size classes of the
    iPad.  \n\n## Expected Behavior\n- The UI should be robust against width and height
    changes.  \n- The button bar should use flexible constraints to ensure buttons
    are evenly spaced and never overlap, regardless of orientation.  \n- The compass
    and top status bar labels should remain anchored to their relative positions.\
    \  \n- UI updates should be triggered correctly during `viewWillTransition(to:with:)`
    without requiring arbitrary delays.  \n\n## Technical Constraints\n- The fix should
    ideally move away from hardcoded frame math towards `NSLayoutConstraints` to handle
    different screen sizes (iPad Pro 10.5\", iPhone X, etc.) natively.  \n- Ensure
    that the `viewWillTransition` logic is clean and does not introduce unnecessary
    `DispatchQueue` delays unless absolutely required by the UIKit lifecycle."
  before_repo_set_cmd: ''
