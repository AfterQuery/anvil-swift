name: Anvil Eval
run-name: "${{ inputs.agent }} · ${{ inputs.dataset }} · ${{ inputs.model }} · k=${{ inputs.n_attempts }}"

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: "Dataset (repo) to evaluate"
        required: true
        type: choice
        options:
          - iOS-Open-GPX-Tracker
          - ACHNBrowserUI
          - firefox-ios
      agent:
        description: "Agent to use"
        required: true
        type: choice
        options:
          - mini-swe-agent
          - oracle
        default: mini-swe-agent
      model:
        description: "Model (only used for mini-swe-agent, ignored for oracle)"
        required: false
        type: choice
        options:
          - openrouter/anthropic/claude-sonnet-4.5
          - openrouter/anthropic/claude-opus-4.6
          - openrouter/openai/gpt-5.2
          - openrouter/openai/gpt-5.2-codex
          - openrouter/google/gemini-3-pro-preview
          - openrouter/qwen/qwen3-coder-next
          - openrouter/deepseek/deepseek-v3.2
        default: openrouter/anthropic/claude-sonnet-4.5
      n_attempts:
        description: "Number of attempts per task (pass@k)"
        required: true
        type: number
        default: 4

env:
  DATASET_PATH: "datasets/${{ inputs.dataset }}"
  TASKS_PATH: "tasks/${{ inputs.dataset }}"

jobs:
  eval:
    runs-on: macos-15
    timeout-minutes: 240
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /Applications/Xcode_16.0.app /Applications/Xcode_16.1.app
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes/*.simruntime
          df -h

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install iOS Simulator runtime
        run: |
          xcodebuild -downloadPlatform iOS
          xcrun simctl boot "iPhone 17 Pro" 2>/dev/null || true
          xcrun simctl list devices booted

      - name: Install watchOS Simulator runtime
        if: inputs.dataset == 'iOS-Open-GPX-Tracker'
        run: xcodebuild -downloadPlatform watchOS

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python deps
        run: uv sync

      - name: Clone source repo
        run: |
          REPO_URL=$(head -1 "${{ env.TASKS_PATH }}/repo.md" | grep -oE 'https://github\.com/[^ ]+')
          if [ -z "$REPO_URL" ]; then
            echo "::error::Could not extract repo URL from ${{ env.TASKS_PATH }}/repo.md"
            exit 1
          fi
          echo "Cloning $REPO_URL into repos/${{ inputs.dataset }}"
          git clone "$REPO_URL" "repos/${{ inputs.dataset }}"

      - name: Convert dataset
        run: uv run anvil convert-dataset --dataset "${{ env.TASKS_PATH }}"

      - name: Restore Xcode build cache
        id: xcode-cache
        uses: actions/cache@v4
        with:
          path: .xcode-cache/${{ inputs.dataset }}
          key: xcode-cache-${{ inputs.dataset }}-${{ hashFiles(format('tasks/{0}/**', inputs.dataset)) }}
          restore-keys: |
            xcode-cache-${{ inputs.dataset }}-

      - name: Warm Xcode build cache
        if: steps.xcode-cache.outputs.cache-hit != 'true'
        run: uv run anvil warm-xcode-cache --dataset "${{ env.DATASET_PATH }}"

      - name: Compute artifact name
        id: artifact-name
        run: |
          # Ensure non-empty artifact name (upload-artifact rejects empty names)
          MODEL="${{ inputs.model }}"
          SAFE_MODEL=$(echo "${MODEL:-unknown}" | tr '/' '-')
          if [ -n "$SAFE_MODEL" ] && [ "$SAFE_MODEL" != "unknown" ]; then
            NAME="eval-results-${{ inputs.dataset }}-${SAFE_MODEL}-${{ inputs.agent }}"
          else
            NAME="eval-results-${{ inputs.dataset }}-${{ inputs.agent }}"
          fi
          echo "value=${NAME}" >> $GITHUB_OUTPUT

      - name: Restore previous results
        id: prev-results
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.artifact-name.outputs.value }}
          path: /tmp/prev-results
        continue-on-error: true

      - name: Decompress previous results
        if: steps.prev-results.outcome == 'success'
        run: tar -xzf /tmp/prev-results/eval-results.tar.gz -C "${{ env.DATASET_PATH }}"

      - name: Run evaluation
        run: |
          AGENT_ARGS="--agent ${{ inputs.agent }}"
          if [ "${{ inputs.agent }}" = "oracle" ]; then
            MODEL_ARGS=""
          else
            MODEL_ARGS="--model ${{ inputs.model }}"
          fi

          uv run anvil run-evals \
            --dataset "${{ env.DATASET_PATH }}" \
            $MODEL_ARGS \
            $AGENT_ARGS \
            --n-attempts "${{ inputs.n_attempts }}"

      - name: Compress results
        if: always()
        run: tar -czf eval-results.tar.gz -C "${{ env.DATASET_PATH }}" runs/

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-name.outputs.value }}
          path: eval-results.tar.gz
          overwrite: true
          retention-days: 7
